name: Build ffz Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        sdk: ['', '15.0', '14.0']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Theos
      run: |
        git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
    
    - name: Install Theos Dependencies
      run: |
        brew install ldid xz
    
    - name: Build ffz Tweak (arm64) - SDK ${{ matrix.sdk }}
      run: |
        export THEOS=$HOME/theos
        cd $GITHUB_WORKSPACE
        make clean
        if [ -z "${{ matrix.sdk }}" ]; then
          make package ARCHS=arm64
        else
          make package ARCHS=arm64 SDKVERSION=${{ matrix.sdk }}
        fi
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ffz-dylib-sdk${{ matrix.sdk || 'default' }}
        path: |
          .theos/obj/arm64/ffz.dylib
          packages/
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: .theos/obj/arm64/ffz.dylib
