name: Build ffz Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        sdk: ['14.0', '14.1', '14.2', '14.3', '14.4', '14.5', '14.6', '14.7', '14.8', '15.0', '15.1', '15.2', '15.3', '15.4', '15.5', '15.6', '15.7', '15.8', '16.0', '16.1', '16.2', '16.3', '16.4', '16.5', '16.6', '16.7', '17.0', '17.1', '17.2', '17.3', '17.4', '17.5', '17.6', '17.7', '18.0', '18.1', '18.2', '18.3', '18.4', '18.5', '18.6', '18.7', '19.0', '19.1', '19.2', '19.3', '19.4', '19.5', '19.6', '19.7', '20.0', '20.1', '20.2', '20.3', '20.4', '20.5', '20.6', '20.7', '21.0', '21.1', '21.2', '21.3', '21.4', '21.5', '21.6', '21.7', '22.0', '22.1', '22.2', '22.3', '22.4', '22.5', '22.6', '22.7', '23.0', '23.1', '23.2', '23.3', '23.4', '23.5', '23.6', '23.7', '24.0', '24.1', '24.2', '24.3', '24.4', '24.5', '24.6', '24.7', '25.0', '25.1', '25.2', '25.3', '25.4', '25.5', '25.6', '25.7', '26.0', '26.1', '26.2', '26.3', '26.4']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Theos
      run: |
        git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
    
    - name: Install Theos Dependencies
      run: |
        brew install ldid xz
    
    - name: Build ffz Tweak (arm64) - iOS ${{ matrix.sdk }}
      run: |
        export THEOS=$HOME/theos
        cd $GITHUB_WORKSPACE
        make clean
        make package ARCHS=arm64 SDKVERSION=${{ matrix.sdk }} 2>&1 | tail -50 || true
      continue-on-error: true
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ffz-dylib-ios${{ matrix.sdk }}
        path: |
          .theos/obj/arm64/ffz.dylib
          packages/
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: .theos/obj/arm64/ffz.dylib
