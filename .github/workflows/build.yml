name: Build ffz Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Theos
      run: |
        git clone --depth 1 https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV
    
    - name: Install Theos Dependencies
      run: |
        brew install ldid xz
    
    - name: Download iOS SDK
      run: |
        cd ~/theos
        ./bin/update-theos
    
    - name: Build ffz Tweak (arm64)
      run: |
        cd $GITHUB_WORKSPACE
        make clean
        make package ARCHS=arm64 SDKVERSION=16.5
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ffz-dylib
        path: |
          .theos/obj/arm64/ffz.dylib
          packages/
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: .theos/obj/arm64/ffz.dylib
